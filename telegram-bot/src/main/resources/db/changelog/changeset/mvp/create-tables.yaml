databaseChangeLog:
  - changeSet:
      id: create-step
      author: Mari
      changes:
        - createTable:
            tableName: tag
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - createTable:
            tableName: step
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
              - column:
                  name: author
                  type: VARCHAR(255)
              - column:
                  name: era
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
        - createTable:
            tableName: step_tags
            columns:
              - column:
                  name: step_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: step_tags
            baseColumnNames: step_id
            referencedTableName: step
            referencedColumnNames: id
            constraintName: fk_steptags_step
        - addForeignKeyConstraint:
            baseTableName: step_tags
            baseColumnNames: tag_id
            referencedTableName: tag
            referencedColumnNames: id
            constraintName: fk_steptags_tag