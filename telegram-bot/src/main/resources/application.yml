spring:
  application:
    name: Dancehall-steps
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
bot:
  token: ${BOT_TOKEN}
  name: ${BOT_NAME}
  greeting: classpath:static/start

analytics:
  ui-version: v1
  providers:
    db:
      enabled: true
    posthog:
      enabled: true
      api-key: ${POSTHOG_TOKEN}
      host: https://eu.i.posthog.com